services:
  postgres:
    image: postgres:16-alpine
    container_name: rental-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rental_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rental_tracker']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
