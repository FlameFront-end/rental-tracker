<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07111f" />
    <title>Rental Tracker</title>
    <style>
      :root {
        color-scheme: dark;
        --launch-bg: #07111f;
        --launch-border: rgba(134, 160, 201, 0.16);
        --launch-accent: #46d4c6;
      }

      :root[data-launch-theme='light'] {
        color-scheme: light;
        --launch-bg: #f4efe6;
        --launch-border: rgba(93, 108, 129, 0.16);
        --launch-accent: #0d9488;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--launch-bg);
      }

      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      #launch-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: var(--launch-bg);
        transition:
          opacity 220ms ease,
          visibility 220ms ease,
          transform 220ms ease;
      }

      #launch-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        transform: scale(1.02);
        pointer-events: none;
      }

      .launch-spinner {
        width: 2.75rem;
        height: 2.75rem;
        border: 3px solid color-mix(in srgb, var(--launch-border) 72%, transparent);
        border-top-color: var(--launch-accent);
        border-radius: 50%;
        animation: launch-spin 0.8s linear infinite;
      }

      @keyframes launch-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        var root = document.documentElement;
        var themeColorMeta = document.querySelector('meta[name="theme-color"]');

        function getBrightness(hexColor) {
          if (!hexColor || typeof hexColor !== 'string') {
            return null;
          }

          var normalized = hexColor.length === 4
            ? '#' + hexColor[1] + hexColor[1] + hexColor[2] + hexColor[2] + hexColor[3] + hexColor[3]
            : hexColor.slice(0, 7);

          var red = parseInt(normalized.slice(1, 3), 16);
          var green = parseInt(normalized.slice(3, 5), 16);
          var blue = parseInt(normalized.slice(5, 7), 16);

          if ([red, green, blue].some(function (value) { return Number.isNaN(value); })) {
            return null;
          }

          return (red * 299 + green * 587 + blue * 114) / 1000;
        }

        function applyTheme(theme) {
          root.dataset.launchTheme = theme;

          if (!themeColorMeta) {
            return;
          }

          themeColorMeta.setAttribute('content', theme === 'light' ? '#f4efe6' : '#07111f');
        }

        try {
          var bgColor =
            window.Telegram &&
            window.Telegram.WebApp &&
            window.Telegram.WebApp.themeParams &&
            (
              window.Telegram.WebApp.themeParams.bg_color ||
              window.Telegram.WebApp.themeParams.secondary_bg_color ||
              window.Telegram.WebApp.themeParams.header_bg_color
            );
          var brightness = getBrightness(bgColor);

          applyTheme(brightness !== null && brightness >= 150 ? 'light' : 'dark');
        } catch (error) {
          applyTheme(window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        }

        try {
          if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.ready === 'function') {
            window.Telegram.WebApp.ready();
          }
        } catch (error) {
          // Ignore Telegram ready() access errors outside Mini App.
        }
      })();
    </script>
  </head>
  <body>
    <div id="launch-splash" aria-hidden="true">
      <div class="launch-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
